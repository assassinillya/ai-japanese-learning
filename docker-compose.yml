services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: japanese_learning
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d japanese_learning"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      APP_TOKEN_SECRET: ${APP_TOKEN_SECRET:-change-me-in-production}
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-123456}@postgres:5432/japanese_learning?sslmode=disable
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  postgres_data:
